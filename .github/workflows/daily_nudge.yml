name: Daily Study Nudge

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  send-nudge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily nudge
        env:
          GMAIL_ID: ${{ secrets.GMAIL_ID }}
          GMAIL_Password: ${{ secrets.GMAIL_PASSWORD }}
          Receiver_GMAIL_ID: ${{ secrets.RECEIVER_GMAIL_ID }}
        run: python daily_nudge.py